name: Build Bridge App (Windows MSI)

on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:

jobs:
  build:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 30

    permissions:
      contents: write  # required by softprops/action-gh-release to create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bridge-app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('bridge-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: bridge-app/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('bridge-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install npm dependencies
        working-directory: bridge-app
        run: npm install

      - name: Build Tauri app (release MSI + signature)
        working-directory: bridge-app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Locate MSI and signature files
        id: locate
        shell: bash
        run: |
          MSI=$(find bridge-app/src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          SIG=$(find bridge-app/src-tauri/target/release/bundle/msi -name "*.msi.zip.sig" | head -1)
          echo "msi=$MSI" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"
          echo "Found MSI: $MSI"
          echo "Found SIG: $SIG"

      - name: Generate latest.json update manifest
        shell: bash
        run: |
          VERSION=$(node -p "require('./bridge-app/package.json').version")
          SIG_CONTENT=$(cat "${{ steps.locate.outputs.sig }}")
          TAG="${GITHUB_REF_NAME:-bridge-v${VERSION}}"
          MSI_FILENAME=$(basename "${{ steps.locate.outputs.msi }}")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Round 23: in-app updater, white-border fix, localeCompare null guard, Check for Updates UI.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG_CONTENT}",
                "url": "https://github.com/ricardosilva1998/iracing-setup-comparison/releases/download/${TAG}/${MSI_FILENAME}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload MSI and update manifest as GitHub Release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ steps.locate.outputs.msi }}
            latest.json
          generate_release_notes: true
