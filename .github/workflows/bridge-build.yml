name: Build Bridge App (Windows MSI)

on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:

jobs:
  build:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 30

    permissions:
      contents: write  # required by softprops/action-gh-release to create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bridge-app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('bridge-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: bridge-app/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('bridge-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install npm dependencies
        working-directory: bridge-app
        run: npm install

      - name: Build Tauri app (release MSI)
        working-directory: bridge-app
        run: npm run tauri build
        env:
          # No code-signing cert for now; Tauri will build unsigned.
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload MSI as GitHub Release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bridge-app/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
